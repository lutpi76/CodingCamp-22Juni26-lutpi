<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header>
      <h1>Expense &amp; Budget Visualizer</h1>
      <div class="balance-container">
        <span class="balance-label">Total Balance:</span>
        <span id="total-balance">0.00</span>
      </div>
      <div class="spending-limit-container">
        <label for="spending-limit">Spending Limit:</label>
        <input type="number" id="spending-limit" placeholder="Set spending limit" min="0.01" step="0.01" />
      </div>
      <button id="theme-toggle">Toggle Dark/Light Mode</button>
    </header>

    <section id="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" placeholder="Item name" />
        </div>
        <div class="form-group">
          <label for="item-amount">Amount</label>
          <input type="number" id="item-amount" placeholder="Amount" min="0.01" step="0.01" />
        </div>
        <div class="form-group">
          <label for="item-category">Category</label>
          <select id="item-category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>
        <button type="submit">Add Transaction</button>
        <p id="form-error" role="alert"></p>
      </form>
    </section>

    <section id="list-section">
      <h2>Transaction List</h2>
      <div class="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="default">Default</option>
          <option value="amount-asc">Amount Ascending</option>
          <option value="amount-desc">Amount Descending</option>
          <option value="category-az">Category A–Z</option>
        </select>
      </div>
      <p id="empty-state">No transactions yet.</p>
      <ul id="transaction-list"></ul>
    </section>

    <section id="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="spending-chart"></canvas>
      <p id="chart-placeholder">No data to display yet.</p>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
